<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Better Auth Flows Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Light mode (default) */
    --bg: #ffffff; --bg2: #f8f9fa; --bg3: #e9ecef; --bg4: #dee2e6;
    --fg: #212529; --fg2: #6c757d; --fg3: #adb5bd;
    --accent: #6366f1; --accent2: #4f46e5; --accent-bg: rgba(99,102,241,0.12);
    --green: #22c55e; --green-bg: rgba(34,197,94,0.12);
    --orange: #f59e0b; --orange-bg: rgba(245,158,11,0.12);
    --red: #ef4444; --red-bg: rgba(239,68,68,0.12);
    --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.12);
    --purple: #a855f7; --purple-bg: rgba(168,85,247,0.12);
    --radius: 8px; --radius-lg: 12px;
    --font: system-ui, -apple-system, sans-serif;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  }
  [data-theme="dark"] {
    /* Dark mode */
    --bg: #111; --bg2: #1a1a1a; --bg3: #222; --bg4: #2a2a2a;
    --fg: #e5e5e5; --fg2: #999; --fg3: #666;
    --accent2: #818cf8;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--fg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* Header */
  .header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--bg3); flex-shrink: 0; }
  .header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
  .header .badge { font-size: 11px; background: var(--accent-bg); color: var(--accent2); padding: 2px 8px; border-radius: 99px; }
  .theme-toggle { background: var(--bg3); border: 1px solid var(--bg4); border-radius: var(--radius); padding: 6px 10px; color: var(--fg2); cursor: pointer; font-size: 16px; transition: all 0.15s; }
  .theme-toggle:hover { color: var(--fg); border-color: var(--fg3); }
  .search-box { margin-left: auto; background: var(--bg3); border: 1px solid var(--bg4); border-radius: var(--radius); padding: 6px 12px; color: var(--fg); font-size: 13px; width: 220px; outline: none; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--fg3); }

  /* Main layout - single column */
  .main { display: flex; flex-direction: column; flex: 1; overflow-y: auto; overflow-x: hidden; }

  /* Navigation bar (was sidebar) */
  .nav-bar { border-bottom: 1px solid var(--bg3); flex-shrink: 0; padding: 8px 16px; }
  .tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { font-size: 11px; padding: 4px 10px; border-radius: 99px; cursor: pointer; background: var(--bg3); color: var(--fg2); border: 1px solid transparent; font-family: var(--font); transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .tab:hover { color: var(--fg); background: var(--bg4); border-color: var(--fg3); }
  .tab.active { background: var(--accent-bg); color: var(--accent2); }
  .flow-chips { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .flow-chips::-webkit-scrollbar { display: none; }
  .flow-chip { font-size: 12px; padding: 5px 12px; border-radius: 99px; cursor: pointer; background: var(--bg3); color: var(--fg2); border: 1px solid var(--bg4); white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
  .flow-chip:hover { color: var(--fg); background: var(--bg4); border-color: var(--fg3); }
  .flow-chip.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--bg4); }
  .flow-chip.active:hover { border-color: var(--accent); }

  /* Content area */
  .content { flex: 1; display: flex; flex-direction: column; }

  /* Flow header */
  .flow-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--bg3); flex-shrink: 0; }
  .flow-header h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .flow-header .subtitle { font-size: 13px; color: var(--fg2); line-height: 1.5; }
  .flow-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .flow-tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .tag-plugin { background: var(--purple-bg); color: #c084fc; }
  .tag-builtin { background: var(--green-bg); color: var(--green); }
  .tag-enterprise { background: var(--orange-bg); color: var(--orange); }
  .tag-security { background: var(--red-bg); color: var(--red); }

  /* Panels - stacked vertically */
  .panels { display: flex; flex-direction: column; }
  .panel { padding: 20px 16px; }
  .panel + .panel { border-top: 1px solid var(--bg3); }
  .panel-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg3); margin-bottom: 16px; font-weight: 600; }

  /* Flow diagram - vertical timeline */
  .flow-diagram { display: flex; flex-direction: column; gap: 0; padding: 4px 0 4px 12px; }
  .flow-step { position: relative; border-left: 3px solid var(--bg4); padding: 10px 14px 10px 20px; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px; }
  .flow-step::before { content: ''; position: absolute; left: -6px; top: 16px; width: 9px; height: 9px; border-radius: 99px; background: var(--bg4); border: 2px solid var(--bg2); z-index: 1; }
  .flow-step:last-child { border-left-color: transparent; }
  .flow-step .step-num { font-size: 10px; color: var(--accent2); font-weight: 700; background: var(--bg3); border-radius: 99px; padding: 2px 8px; flex-shrink: 0; margin-top: 1px; }
  .flow-step .step-body { flex: 1; }
  .flow-step .step-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .flow-step .step-detail { font-size: 11px; color: var(--fg2); line-height: 1.4; }
  .flow-step:hover { background: rgba(255,255,255,0.03); }
  .flow-step.highlight { border-left-color: var(--accent); background: var(--accent-bg); }
  .flow-step.highlight::before { background: var(--accent); }
  .flow-step.backend { opacity: 0.6; }
  .flow-step.backend .step-title::before { content: '⚙️ '; margin-right: 4px; }
  .flow-step.backend .step-badge { font-size: 9px; padding: 2px 6px; border-radius: 99px; background: var(--bg3); color: var(--fg3); text-transform: uppercase; letter-spacing: 0.03em; margin-left: 6px; }

  /* Scenario controls */
  .scenario-bar { display: flex; gap: 16px; flex-wrap: wrap; padding: 12px 16px; border-bottom: 1px solid var(--bg3); align-items: center; }
  .scenario-group { display: flex; align-items: center; gap: 6px; }
  .scenario-label { font-size: 10px; color: var(--fg3); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .scenario-toggle { display: flex; border: 1px solid var(--bg4); border-radius: 99px; overflow: hidden; }
  .scenario-opt { font-size: 11px; padding: 4px 10px; cursor: pointer; color: var(--fg2); transition: all 0.15s; border: none; background: none; font-family: var(--font); }
  .scenario-opt:hover { color: var(--fg); }
  .scenario-opt.active { background: var(--accent-bg); color: var(--accent2); }
  .feature-chip { font-size: 11px; padding: 4px 10px; border-radius: 99px; cursor: pointer; border: 1px solid var(--bg4); color: var(--fg2); transition: all 0.15s; background: none; font-family: var(--font); }
  .feature-chip:hover { color: var(--fg); border-color: var(--fg3); }
  .feature-chip.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent); }
  .feature-chip.disabled { opacity: 0.25; pointer-events: none; }

  /* Wireframe mockup */
  .wireframe { background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius-lg); padding: 0; max-width: 320px; overflow: hidden; margin: 0 auto; }
  .wf-statusbar { height: 24px; background: var(--bg3); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; font-size: 10px; color: var(--fg3); }
  .wf-body { padding: 24px 20px; }
  .wf-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .wf-subtitle { font-size: 12px; color: var(--fg2); margin-bottom: 20px; }
  .wf-input { background: var(--bg3); border: 1px solid var(--bg4); border-radius: 6px; padding: 10px 12px; font-size: 12px; color: var(--fg2); margin-bottom: 10px; width: 100%; }
  .wf-btn { background: var(--accent); border-radius: 6px; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; color: white; margin-bottom: 10px; width: 100%; }
  .wf-btn.outline { background: transparent; border: 1px solid var(--bg4); color: var(--fg2); }
  .wf-divider { display: flex; align-items: center; gap: 8px; margin: 14px 0; font-size: 11px; color: var(--fg3); }
  .wf-divider::before, .wf-divider::after { content: ''; flex: 1; height: 1px; background: var(--bg4); }
  .wf-social-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .wf-social { flex: 1; background: var(--bg3); border: 1px solid var(--bg4); border-radius: 6px; padding: 8px; text-align: center; font-size: 11px; color: var(--fg2); }
  .wf-link { font-size: 12px; color: var(--accent2); text-align: center; margin-top: 12px; }
  .wf-otp-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .wf-otp-box { flex: 1; background: var(--bg3); border: 1px solid var(--bg4); border-radius: 6px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--fg); }
  .wf-icon { width: 48px; height: 48px; background: var(--accent-bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 16px; }
  .wf-chip { display: inline-block; font-size: 10px; padding: 3px 8px; border-radius: 99px; background: var(--green-bg); color: var(--green); margin-bottom: 8px; }
  .wf-list-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg3); border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
  .wf-list-dot { width: 8px; height: 8px; border-radius: 99px; flex-shrink: 0; }
  .wf-list-item .wf-meta { font-size: 10px; color: var(--fg3); margin-left: auto; }
  .wf-toggle { width: 36px; height: 20px; border-radius: 99px; background: var(--accent); position: relative; margin-left: auto; flex-shrink: 0; }
  .wf-toggle::after { content: ''; width: 16px; height: 16px; border-radius: 99px; background: white; position: absolute; top: 2px; right: 2px; }
  .wf-toggle.off { background: var(--bg4); }
  .wf-toggle.off::after { right: auto; left: 2px; }
  .wf-biometric { width: 64px; height: 64px; border-radius: 99px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 16px auto; }
  .wf-qr { width: 120px; height: 120px; background: var(--bg3); border: 1px solid var(--bg4); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 10px; color: var(--fg3); }
  .wf-progress { height: 4px; background: var(--bg4); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .wf-progress-bar { height: 100%; background: var(--accent); border-radius: 2px; }
  .wf-avatar { width: 40px; height: 40px; border-radius: 99px; background: var(--accent-bg); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .wf-card { background: var(--bg3); border: 1px solid var(--bg4); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .wf-card-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .wf-card-text { font-size: 11px; color: var(--fg2); line-height: 1.4; }
  .wf-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--bg4); }
  .wf-tab { flex: 1; padding: 8px; text-align: center; font-size: 11px; color: var(--fg3); border-bottom: 2px solid transparent; }
  .wf-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }
  .wf-banner { background: var(--orange-bg); border-radius: 6px; padding: 10px 12px; font-size: 11px; color: var(--orange); margin-bottom: 12px; }
  .wf-key { font-family: var(--mono); font-size: 11px; background: var(--bg3); border: 1px solid var(--bg4); border-radius: 4px; padding: 6px 10px; color: var(--fg2); word-break: break-all; margin-bottom: 10px; }

  /* State selector bar */
  .state-bar { display: flex; gap: 4px; padding: 0 0 14px; flex-wrap: wrap; }
  .state-opt { font-size: 11px; padding: 4px 10px; border-radius: 99px; cursor: pointer; color: var(--fg2); transition: all 0.15s; border: 1px solid var(--bg4); background: none; font-family: var(--font); }
  .state-opt:hover { color: var(--fg); border-color: var(--fg3); }
  .state-opt.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent); }
  .state-opt.disabled { opacity: 0.25; pointer-events: none; }

  /* Validation notes panel */
  #wireframe { margin-bottom: 6px; }
  #wireframeNotes { margin-top: 0; padding-top: 0; border-top: none; }
  #wireframeNotes.has-notes { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--bg3); }
  .notes-panel { width: 100%; max-width: none; margin: 0; background: #ffffff; border: none; border-radius: 0; padding: 0; color: #111827; }
  .notes-header { margin-bottom: 8px; }
  .notes-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px; background: none; border: 1px solid #e5e7eb; border-radius: 6px; color: #111827; font-family: var(--font); font-size: 12px; font-weight: 600; padding: 8px 10px; cursor: pointer; transition: all 0.15s; text-align: left; }
  .notes-toggle:hover { border-color: #d1d5db; background: #f9fafb; }
  .notes-toggle-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; font-weight: 600; }
  .notes-toggle-icon { color: #6b7280; font-size: 11px; flex-shrink: 0; }
  .notes-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; font-weight: 600; margin-bottom: 6px; }
  .notes-subtitle { font-size: 11px; color: #4b5563; line-height: 1.4; margin-bottom: 10px; }
  .notes-content { margin-top: 8px; }
  .notes-content.collapsed { display: none; }
  .notes-table-wrap { width: 100%; overflow-x: auto; border: 1px solid #e5e7eb; border-radius: 6px; }
  .notes-table { width: 100%; min-width: 0; border-collapse: collapse; background: #ffffff; }
  .notes-table th, .notes-table td { padding: 8px; text-align: left; vertical-align: top; border-bottom: 1px solid #e5e7eb; line-height: 1.4; }
  .notes-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: #6b7280; font-weight: 600; background: #f9fafb; }
  .notes-table td { font-size: 11px; color: #374151; }
  .notes-table td:first-child { color: #111827; font-weight: 600; white-space: nowrap; }
  .notes-table tr:last-child td { border-bottom: none; }
  .notes-empty { width: 100%; max-width: none; margin: 0; padding: 10px 12px; border: 1px dashed #d1d5db; border-radius: var(--radius); font-size: 11px; color: #6b7280; background: #ffffff; }

  /* Empty state placeholders */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; text-align: center; color: var(--fg3); min-height: 200px; }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state-title { font-size: 14px; font-weight: 600; color: var(--fg2); margin-bottom: 6px; }
  .empty-state-text { font-size: 12px; line-height: 1.5; max-width: 280px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg3); }

  /* ===== RESPONSIVE DESIGN ===== */

  /* Panel toggle (mobile only) */
  .panel-toggle { background: none; border: none; color: var(--fg2); cursor: pointer; padding: 0 8px; font-size: 12px; margin-left: auto; display: none; }
  .panel-toggle:hover { color: var(--fg); }

  /* Mobile adjustments (<768px) */
  @media (max-width: 767px) {
    .flow-chips { flex-wrap: wrap; }
    .scenario-group { font-size: 9px; }
    .feature-chip { padding: 3px 8px; font-size: 10px; }
    .search-box { width: 140px; min-width: 100px; }
    .header h1 { font-size: 14px; }

    .panel-toggle { display: inline-block; }
    .panel-label { display: flex; align-items: center; justify-content: space-between; }
  }

  /* Desktop three-column layout (≥768px) */
  @media (min-width: 768px) {
    /* Grid layout: sidebar | content */
    .main { display: grid; grid-template-columns: 250px 1fr; grid-template-rows: 1fr; overflow: hidden; }

    /* Nav bar becomes sidebar */
    .nav-bar {
      grid-column: 1;
      grid-row: 1;
      border-bottom: none;
      border-right: 1px solid var(--bg3);
      padding: 16px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Vertical tabs */
    .tabs {
      flex-direction: column;
      gap: 2px;
      overflow-x: visible;
      padding-bottom: 0;
    }
    .tab {
      width: 100%;
      text-align: left;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
    }

    /* Add category header */
    .tabs::before {
      content: 'CATEGORIES';
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--fg3);
      margin-bottom: 6px;
      font-weight: 600;
      display: block;
    }

    /* Vertical flow chips */
    .flow-chips {
      flex-direction: column;
      gap: 2px;
      overflow-x: visible;
    }
    .flow-chip {
      width: 100%;
      text-align: left;
      padding: 6px 12px;
      border-radius: 6px;
    }

    /* Add flows header */
    .flow-chips::before {
      content: 'FLOWS';
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--fg3);
      margin-bottom: 6px;
      font-weight: 600;
      display: block;
    }

    /* Content takes right side */
    .content {
      grid-column: 2;
      grid-row: 1;
      overflow-y: auto;
    }

    /* Horizontal panels */
    .panels {
      flex-direction: row;
      gap: 0;
    }
    .panel + .panel {
      border-top: none;
      border-left: 1px solid var(--bg3);
      padding-left: 20px;
    }
    #diagramPanel { flex: 1 1 50%; min-width: 0; }
    #mockupPanel { flex: 1 1 50%; min-width: 320px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Better Auth Flows Explorer</h1>
  <span class="badge">v1.x</span>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">☀️</button>
  <input type="text" class="search-box" id="search" placeholder="Search flows..." oninput="filterFlows()">
</div>

<div class="main">
  <div class="nav-bar">
    <div class="tabs" id="tabs"></div>
    <div class="flow-chips" id="flowChips"></div>
  </div>
  <div class="content">
    <div class="flow-header" id="flowHeader">
      <h2 id="flowTitle">Select a flow</h2>
      <div class="subtitle" id="flowSubtitle">Choose a category and flow to explore.</div>
      <div class="flow-tags" id="flowTags"></div>
    </div>
    <div class="scenario-bar" id="scenarioBar" style="display:none"></div>
    <div class="panels">
      <div class="panel" id="diagramPanel">
        <div class="panel-label">
          User Flow
          <button class="panel-toggle" onclick="toggleDiagramPanel()">
            <span id="diagramToggleIcon">▼</span>
          </button>
        </div>
        <div id="flowDiagram"></div>
      </div>
      <div class="panel" id="mockupPanel">
        <div class="panel-label">UI Wireframe</div>
        <div class="state-bar" id="stateBar"></div>
        <div id="wireframe"></div>
        <div id="wireframeNotes"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Wireframe Helpers ──
const W = (bar, body) => `<div class="wireframe"><div class="wf-statusbar"><span>9:41</span><span>${bar}</span><span>100%</span></div><div class="wf-body">${body}</div></div>`;
const wfIcon = (emoji, bg) => `<div class="wf-icon"${bg ? ` style="background:${bg}"` : ''}>${emoji}</div>`;
const wfTitle = (t, center) => `<div class="wf-title"${center ? ' style="text-align:center"' : ''}>${t}</div>`;
const wfSub = (t, center) => `<div class="wf-subtitle"${center ? ' style="text-align:center"' : ''}>${t}</div>`;
const wfBtn = (t, style) => `<div class="wf-btn${style === 'outline' ? ' outline' : ''}"${style && style !== 'outline' ? ` style="${style}"` : ''}>${t}</div>`;
const wfInput = (t) => `<div class="wf-input">${t}</div>`;
const wfCard = (title, text) => `<div class="wf-card"><div class="wf-card-title">${title}</div><div class="wf-card-text">${text}</div></div>`;
const wfProgress = (pct) => `<div class="wf-progress"><div class="wf-progress-bar" style="width:${pct}%"></div></div>`;
const wfOtp = (filled) => `<div class="wf-otp-row">${[0,1,2,3,4,5].map(i => `<div class="wf-otp-box">${i < filled ? '●' : '•'}</div>`).join('')}</div>`;
const wfLink = (t) => `<div class="wf-link">${t}</div>`;
const wfDivider = (t) => `<div class="wf-divider">${t || 'or'}</div>`;

// Common reusable screens
const serverProcessing = (bar, title, detail, pct=60) => W(bar, wfIcon('⚙', 'var(--accent-bg)') + wfTitle(title, true) + wfSub(detail, true) + wfProgress(pct));
const successScreen = (bar, title, detail) => W(bar, wfIcon('✓', 'var(--green-bg)') + wfTitle(title, true) + wfSub(detail, true) + wfBtn('Continue'));

// Scenario state
let scenario = { path: 'happy', userType: 'new', features: new Set() };
const FEATURE_DEPENDENCIES = {
  trusted: ['2fa'],
};

// Collapse state (mobile only)
let diagramCollapsed = false;
let scenarioCollapsed = false;

function toggleDiagramPanel() {
  diagramCollapsed = !diagramCollapsed;
  const diagram = document.getElementById('flowDiagram');
  const icon = document.getElementById('diagramToggleIcon');
  diagram.style.display = diagramCollapsed ? 'none' : 'block';
  if (icon) icon.textContent = diagramCollapsed ? '▶' : '▼';
}

function toggleScenarioBar() {
  scenarioCollapsed = !scenarioCollapsed;
  const controls = document.getElementById('scenarioControls');
  const icon = document.getElementById('scenarioToggleIcon');
  controls.style.display = scenarioCollapsed ? 'none' : 'flex';
  if (icon) icon.textContent = scenarioCollapsed ? '▶' : '▼';
}

function getScenarioFeaturesForActiveFlow() {
  if (!activeFlow) return new Set();
  const available = new Set((activeFlow.scenarios || []).filter(f => ['2fa', 'trusted', 'linking'].includes(f)));
  const activeFeatures = new Set([...scenario.features].filter(f => available.has(f)));

  let changed = true;
  while (changed) {
    changed = false;
    for (const feat of [...activeFeatures]) {
      const deps = FEATURE_DEPENDENCIES[feat] || [];
      for (const dep of deps) {
        if (available.has(dep) && !activeFeatures.has(dep)) {
          activeFeatures.delete(feat);
          changed = true;
          break;
        }
      }
    }
  }
  return activeFeatures;
}

function syncScenarioFeatures() {
  scenario.features = getScenarioFeaturesForActiveFlow();
}

function canEnableFeature(feat) {
  if (!activeFlow) return false;
  const scenarios = activeFlow.scenarios || [];
  if (!scenarios.includes(feat)) return false;
  const deps = FEATURE_DEPENDENCIES[feat] || [];
  return deps.every(dep => !scenarios.includes(dep) || scenario.features.has(dep));
}

function getActiveSteps() {
  if (!activeFlow) return [];
  let steps = activeFlow.steps;
  if (scenario.path === 'error' && activeFlow.errorSteps) steps = activeFlow.errorSteps;
  else if (scenario.userType === 'returning' && activeFlow.returningSteps) steps = activeFlow.returningSteps;
  const activeFeatures = getScenarioFeaturesForActiveFlow();
  // Splice in feature steps
  if (activeFlow.featureSteps) {
    let result = [...steps];
    let offset = 0;
    for (const [key, feat] of Object.entries(activeFlow.featureSteps)) {
      if (!activeFeatures.has(key)) continue;
      let insertIdx;
      if (typeof feat.after === 'number') {
        insertIdx = feat.after + offset;
      } else {
        // After another feature's last step
        const depFeat = activeFlow.featureSteps[feat.after];
        if (depFeat && activeFeatures.has(feat.after)) {
          const depIdx = typeof depFeat.after === 'number' ? depFeat.after : 0;
          insertIdx = depIdx + offset + depFeat.steps.length;
        } else {
          insertIdx = result.length - 1;
        }
      }
      result.splice(insertIdx, 0, ...feat.steps);
      offset += feat.steps.length;
    }
    return result;
  }
  return steps;
}

function getActiveMockups() {
  if (!activeFlow) return [];
  const id = activeFlow.id;
  let mockups = STEP_MOCKUPS[id] || [];
  if (scenario.path === 'error' && STEP_MOCKUPS[id + ':error']) mockups = STEP_MOCKUPS[id + ':error'];
  else if (scenario.userType === 'returning' && STEP_MOCKUPS[id + ':returning']) mockups = STEP_MOCKUPS[id + ':returning'];
  const activeFeatures = getScenarioFeaturesForActiveFlow();
  // Splice in feature mockups
  if (activeFlow.featureSteps) {
    let result = [...mockups];
    let offset = 0;
    for (const [key, feat] of Object.entries(activeFlow.featureSteps)) {
      if (!activeFeatures.has(key)) continue;
      const fMockups = feat.mockups || feat.steps.map(() => null);
      let insertIdx;
      if (typeof feat.after === 'number') {
        insertIdx = feat.after + offset;
      } else {
        const depFeat = activeFlow.featureSteps[feat.after];
        if (depFeat && activeFeatures.has(feat.after)) {
          const depIdx = typeof depFeat.after === 'number' ? depFeat.after : 0;
          insertIdx = depIdx + offset + depFeat.steps.length;
        } else {
          insertIdx = result.length - 1;
        }
      }
      result.splice(insertIdx, 0, ...fMockups);
      offset += fMockups.length;
    }
    return result;
  }
  return mockups;
}

function updateScenario(key, value) {
  if (key === 'path') scenario.path = value;
  else if (key === 'userType') scenario.userType = value;
  else if (key === 'feature') {
    if (scenario.features.has(value)) scenario.features.delete(value);
    else if (canEnableFeature(value)) scenario.features.add(value);
  }
  syncScenarioFeatures();
  activeStep = 0;
  renderScenarioBar();
  renderDiagram();
  renderWireframe();
}

function renderScenarioBar() {
  const bar = document.getElementById('scenarioBar');
  if (!activeFlow || !activeFlow.scenarios || activeFlow.scenarios.length === 0) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'block';

  const isMobile = window.innerWidth < 768;
  const toggleBtn = isMobile ? `<button class="panel-toggle" onclick="toggleScenarioBar()"><span id="scenarioToggleIcon">▼</span></button>` : '';

  let html = '';
  const s = activeFlow.scenarios;
  if (s.includes('path')) {
    html += `<div class="scenario-group"><span class="scenario-label">Path</span><div class="scenario-toggle">
      <button class="scenario-opt${scenario.path==='happy'?' active':''}" onclick="updateScenario('path','happy')">Happy</button>
      <button class="scenario-opt${scenario.path==='error'?' active':''}" onclick="updateScenario('path','error')">Error</button>
    </div></div>`;
  }
  if (s.includes('userType')) {
    html += `<div class="scenario-group"><span class="scenario-label">User</span><div class="scenario-toggle">
      <button class="scenario-opt${scenario.userType==='new'?' active':''}" onclick="updateScenario('userType','new')">New</button>
      <button class="scenario-opt${scenario.userType==='returning'?' active':''}" onclick="updateScenario('userType','returning')">Returning</button>
    </div></div>`;
  }
  const featureLabels = { '2fa': '+ 2FA', 'trusted': '+ Trusted Device', 'linking': '+ Account Linking' };
  for (const feat of ['2fa', 'trusted', 'linking']) {
    if (s.includes(feat)) {
      const disabled = !scenario.features.has(feat) && !canEnableFeature(feat);
      html += `<button class="feature-chip${scenario.features.has(feat)?' active':''}${disabled?' disabled':''}"${disabled?' disabled':''} onclick="updateScenario('feature','${feat}')">${featureLabels[feat]}</button>`;
    }
  }

  bar.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <span style="font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:var(--fg3);font-weight:600">Scenarios</span>
    ${toggleBtn}
  </div><div id="scenarioControls" style="display:${scenarioCollapsed ? 'none' : 'flex'};gap:16px;flex-wrap:wrap;align-items:center">${html}</div>`;
}

// State
let activeCategory = 'core';
let activeFlow = null;
let activeStep = 0;
let activeState = 'default';
let searchQuery = '';

// Render tabs
function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = CATEGORIES.map(c =>
    `<button class="tab${c.id === activeCategory ? ' active' : ''}" onclick="selectCategory('${c.id}')">${c.label}</button>`
  ).join('');
}

// Render flow chips (was sidebar list)
function renderFlowChips() {
  const el = document.getElementById('flowChips');
  const flows = FLOWS.filter(f => {
    const matchCat = f.cat === activeCategory;
    const matchSearch = !searchQuery || f.name.toLowerCase().includes(searchQuery) || f.desc.toLowerCase().includes(searchQuery);
    return matchCat && matchSearch;
  });
  el.innerHTML = flows.map(f =>
    `<button class="flow-chip${activeFlow && activeFlow.id === f.id ? ' active' : ''}" onclick="selectFlow('${f.id}')">${f.name}</button>`
  ).join('');
}

// Select category
function selectCategory(id) {
  activeCategory = id;
  activeFlow = null;
  renderTabs();
  renderFlowChips();
  renderContent();
}

// Select flow
function selectFlow(id) {
  activeFlow = FLOWS.find(f => f.id === id);
  activeStep = 0;
  activeState = 'default';
  scenario = { path: 'happy', userType: 'new', features: new Set() };
  renderFlowChips();
  renderContent();
}

// Select step
function selectStep(idx) {
  activeStep = idx;
  activeState = 'default';
  renderDiagram();
  renderWireframe();
}

// Render content
function renderContent() {
  if (!activeFlow) {
    document.getElementById('flowTitle').textContent = 'Select a flow';
    document.getElementById('flowSubtitle').textContent = 'Choose a category and flow to explore.';
    document.getElementById('flowTags').innerHTML = '';
    document.getElementById('scenarioBar').style.display = 'none';
    document.getElementById('flowDiagram').innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🔍</div>
      <div class="empty-state-title">No flow selected</div>
      <div class="empty-state-text">Choose a category and flow to see the step-by-step user journey</div>
    </div>`;
    document.getElementById('wireframe').innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">📱</div>
      <div class="empty-state-title">No wireframe to display</div>
      <div class="empty-state-text">Select a flow to view UI wireframes for each step</div>
    </div>`;
    const notesEl = document.getElementById('wireframeNotes');
    if (notesEl) {
      notesEl.innerHTML = '';
      notesEl.classList.remove('has-notes');
    }
    return;
  }

  document.getElementById('flowTitle').textContent = activeFlow.name;
  document.getElementById('flowSubtitle').textContent = activeFlow.desc;

  const tagClass = { builtin: 'tag-builtin', plugin: 'tag-plugin', enterprise: 'tag-enterprise', security: 'tag-security' };
  const tagLabel = { builtin: 'Built-in', plugin: 'Plugin', enterprise: 'Enterprise', security: 'Security' };
  document.getElementById('flowTags').innerHTML =
    `<span class="flow-tag ${tagClass[activeFlow.tag]}">${tagLabel[activeFlow.tag]}</span>`;

  renderScenarioBar();
  renderDiagram();
  renderWireframe();
}

function renderDiagram() {
  if (!activeFlow) return;
  const steps = getActiveSteps();
  const diagramHtml = steps.map((s, i) => {
    const isBackend = s.backend === true;
    const backendClass = isBackend ? ' backend' : '';
    const backendBadge = isBackend ? '<span class="step-badge">Backend</span>' : '';
    return `<div class="flow-step${i === activeStep ? ' highlight' : ''}${backendClass}" onclick="selectStep(${i})">
      <div class="step-num">${i + 1}</div>
      <div class="step-body">
        <div class="step-title">${s.t}${backendBadge}</div>
        <div class="step-detail">${s.d}</div>
      </div>
    </div>`;
  }).join('');
  const diagramEl = document.getElementById('flowDiagram');
  diagramEl.innerHTML = `<div class="flow-diagram">${diagramHtml}</div>`;
  diagramEl.style.display = diagramCollapsed ? 'none' : 'block';
}

function selectState(state) {
  activeState = state;
  renderWireframe();
}

function renderStateSelector() {
  const bar = document.getElementById('stateBar');
  if (!activeFlow) { bar.innerHTML = ''; return; }
  const key = activeFlow.id + ':' + activeStep;
  const fixtures = STATE_FIXTURES[key] || {};
  const states = [
    { id: 'default', label: 'Default' },
    { id: 'empty', label: 'Empty' },
    { id: 'loading', label: 'Loading' },
    { id: 'error', label: 'Error' },
    { id: 'success', label: 'Success' },
    { id: 'de', label: 'DE' },
  ];
  bar.innerHTML = states.map(s => {
    const available = s.id === 'default' || !!fixtures[s.id];
    const active = activeState === s.id;
    return `<button class="state-opt${active ? ' active' : ''}${!available ? ' disabled' : ''}" onclick="selectState('${s.id}')">${s.label}</button>`;
  }).join('');
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const EXPANDED_STEP_NOTES_KEYS = new Set();

function getNotesForCurrentStep() {
  if (!activeFlow) return null;
  const baseKey = `${activeFlow.id}:${activeStep}`;
  if (activeState !== 'default') {
    const stateKey = `${baseKey}:${activeState}`;
    if (STEP_NOTES[stateKey]) return { key: stateKey, notes: STEP_NOTES[stateKey] };
  }
  if (STEP_NOTES[baseKey]) return { key: baseKey, notes: STEP_NOTES[baseKey] };
  return null;
}

function toggleStepNotes(encodedKey) {
  const key = decodeURIComponent(encodedKey);
  if (EXPANDED_STEP_NOTES_KEYS.has(key)) EXPANDED_STEP_NOTES_KEYS.delete(key);
  else EXPANDED_STEP_NOTES_KEYS.add(key);
  renderWireframeNotes();
}

function renderWireframeNotes() {
  const notesEl = document.getElementById('wireframeNotes');
  if (!notesEl) return;

  const resolved = getNotesForCurrentStep();
  if (!resolved || !resolved.notes || !Array.isArray(resolved.notes.rows) || resolved.notes.rows.length === 0) {
    notesEl.innerHTML = '';
    notesEl.classList.remove('has-notes');
    return;
  }

  const { key, notes } = resolved;
  const detailsTitle = escapeHtml(notes.title || 'Validation Notes');
  const subtitle = notes.subtitle ? `<div class="notes-subtitle">${escapeHtml(notes.subtitle)}</div>` : '';
  const rowHtml = notes.rows.map((row) => {
    const field = escapeHtml(row.field || '-');
    const rule = escapeHtml(row.rule || '-');
    const example = escapeHtml(row.example || '-');
    const error = escapeHtml(row.error || '-');
    return `<tr><td>${field}</td><td>${rule}</td><td>${example}</td><td>${error}</td></tr>`;
  }).join('');
  const isExpanded = EXPANDED_STEP_NOTES_KEYS.has(key);
  const encodedKey = encodeURIComponent(key);
  notesEl.classList.add('has-notes');

  notesEl.innerHTML = `<div class="notes-panel">
    <div class="notes-header">
      <button class="notes-toggle" onclick="toggleStepNotes('${encodedKey}')">
        <span class="notes-toggle-label">Input Constraints</span>
        <span class="notes-toggle-icon">${isExpanded ? '▲' : '▼'}</span>
      </button>
    </div>
    <div class="notes-content${isExpanded ? '' : ' collapsed'}">
      <div class="notes-title">${detailsTitle}</div>
      ${subtitle}
      <div class="notes-table-wrap">
        <table class="notes-table">
          <thead>
            <tr><th>Field</th><th>Rule</th><th>Example</th><th>Error</th></tr>
          </thead>
          <tbody>${rowHtml}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function renderWireframe() {
  if (!activeFlow) {
    const notesEl = document.getElementById('wireframeNotes');
    if (notesEl) {
      notesEl.innerHTML = '';
      notesEl.classList.remove('has-notes');
    }
    return;
  }
  renderStateSelector();
  if (activeState !== 'default') {
    const key = activeFlow.id + ':' + activeStep;
    const fixtures = STATE_FIXTURES[key];
    if (fixtures && fixtures[activeState]) {
      document.getElementById('wireframe').innerHTML = fixtures[activeState];
      renderWireframeNotes();
      return;
    }
  }
  const mockups = getActiveMockups();
  if (mockups && mockups[activeStep]) {
    document.getElementById('wireframe').innerHTML = mockups[activeStep];
    renderWireframeNotes();
  } else {
    const steps = getActiveSteps();
    const stepInfo = steps[activeStep];
    document.getElementById('wireframe').innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">📱</div>
      <div class="empty-state-title">No mockup available</div>
      <div class="empty-state-text">${stepInfo ? stepInfo.t : 'This step doesn\'t have a wireframe yet'}</div>
    </div>`;
    const notesEl = document.getElementById('wireframeNotes');
    if (notesEl) {
      notesEl.innerHTML = '';
      notesEl.classList.remove('has-notes');
    }
  }
}

// Search
function filterFlows() {
  searchQuery = document.getElementById('search').value.toLowerCase().trim();
  if (searchQuery) {
    // Find first matching category
    const match = FLOWS.find(f => f.name.toLowerCase().includes(searchQuery) || f.desc.toLowerCase().includes(searchQuery));
    if (match && match.cat !== activeCategory) {
      activeCategory = match.cat;
      renderTabs();
    }
  }
  renderFlowChips();
}

// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeToggle');
  const isDark = html.getAttribute('data-theme') === 'dark';

  if (isDark) {
    html.removeAttribute('data-theme');
    btn.textContent = '☀️';
    localStorage.setItem('theme', 'light');
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '🌙';
    localStorage.setItem('theme', 'dark');
  }
}

// Init theme from localStorage (default light)
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
  document.getElementById('themeToggle').textContent = '🌙';
}

// Init
renderTabs();
renderFlowChips();
renderContent();

// Select first flow on load
selectFlow('email-password');
</script>
